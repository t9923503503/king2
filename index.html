<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d1a">
<title>Лютые пляжники !! King of the Court</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARIABLES ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#FFD700;--gold2:#FFA500;
  --red:#e94560;--blue:#4DA8DA;--green:#6ABF69;--purple:#C77DFF;
  --dark:#0d0d1a;--dark2:#13131f;--dark3:#1a1a2e;--dark4:#16213e;
  --card:#1e1e32;--text:#e8e8f0;--muted:#6b6b8a;
  --plus:#22c55e;--minus:#ef4444;
  --nav-h:96px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Barlow',sans-serif;
  background:var(--dark);color:var(--text);
  min-height:100vh;
  /* space for fixed nav */
  padding-top:var(--nav-h);
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION  —  KEY: no overflow:hidden/auto here
   Dropdowns use position:fixed so they escape ANY container
   ═══════════════════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;right:0;
  height:var(--nav-h);
  background:var(--dark2);
  border-bottom:1px solid #2a2a40;
  display:flex;flex-direction:column;
  z-index:200;
  padding:0;
}
/* ── Верхняя строка: лого + утилиты ──────────────────────── */
.nav-top{
  display:flex;align-items:center;
  padding:0 10px;height:38px;
  border-bottom:1px solid #1e1e34;
  gap:4px;
}
.nav-logo-container{flex-shrink:0;margin-right:4px;padding-left:4px;display:flex;flex-direction:column;justify-content:center;line-height:1;white-space:nowrap}
.brand-main{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.brand-sub{font-size:.55rem;color:rgba(255,255,255,.7);font-weight:400;letter-spacing:.3px;margin-top:1px}
@media(max-width:380px){.brand-main{font-size:.95rem}}
.nav-spacer{flex:1}
/* ── Нижние 2 ряда пиллов ─────────────────────────────────── */
.nav-pills-row{
  display:flex;align-items:center;
  padding:6px 8px;gap:5px;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.nav-pills-row::-webkit-scrollbar{display:none}
.nav-pill{
  font-family:'Barlow Condensed',sans-serif;
  padding:5px 10px 4px;min-width:52px;
  border-radius:10px;
  background:var(--dark3);
  border:2px solid #2a2a44;
  color:var(--muted);
  cursor:pointer;white-space:nowrap;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;
  transition:all .18s;
  flex-shrink:0;
  text-transform:uppercase;
  position:relative;
}
.nav-pill:hover{border-color:#5a5a8e}
.nav-pill.active{
  background:rgba(255,255,255,.06);
  border-color:var(--pill-c,var(--gold));
  box-shadow:0 0 10px rgba(255,200,50,.15);
}
.nav-pill .pill-main{
  font-size:16px;font-weight:900;letter-spacing:.5px;
  line-height:1;color:var(--muted);
  transition:color .18s;
}
.nav-pill .pill-sub{
  font-size:8px;font-weight:700;letter-spacing:1px;
  line-height:1;color:var(--muted);opacity:.6;
  transition:color .18s;
}
.nav-pill.active .pill-main{color:#fff;}
.nav-pill.active .pill-sub{color:var(--pill-c,var(--gold));opacity:1;}
.nav-pill .pill-dot{
  position:absolute;top:5px;right:6px;
  width:5px;height:5px;border-radius:50%;
  background:#3a3a5a;
  flex-shrink:0;
}
.nav-pill.active .pill-dot{
  background:var(--pill-c,var(--gold));
  box-shadow:0 0 4px var(--pill-c,var(--gold));
}
.nav-pill.pill-div-btn{min-width:64px;}
.nav-pill.pill-div-btn .pill-main{font-size:11px;letter-spacing:.8px;}
.nav-pill-sep{
  width:1px;height:40px;background:#2a2a44;flex-shrink:0;margin:0 3px;
}

/* legacy nb class — kept for icon-only utility buttons in nav-top */
.nb{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  padding:0 8px;height:100%;
  color:var(--muted);background:transparent;border:none;
  border-bottom:3px solid transparent;
  cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
  transition:color .18s,border-color .18s;
  flex-shrink:0;
}
.nb.nb-icon{font-size:20px;padding:0 6px;letter-spacing:0;}
.nb:hover{color:var(--text)}
.nb.active{color:var(--gold);border-bottom-color:var(--gold)}
.nb-arrow{font-size:9px;opacity:.55;transition:transform .15s}
.nb.dd-open .nb-arrow{transform:rotate(180deg)}

/* ── DROPDOWN  ——  position:fixed, z-index above everything ── */
/*    Left/top are set by JS via getBoundingClientRect()        */
.dropdown{
  position:fixed;
  /* top/left set by JS */
  z-index:9999;
  background:var(--dark3);
  border:1px solid #3a3a5e;
  border-radius:0 0 12px 12px;
  min-width:152px;
  box-shadow:0 20px 60px rgba(0,0,0,.75);
  display:none;
  overflow:hidden;
  animation:ddFade .14s ease;
}
.dropdown.open{display:block}
@keyframes ddFade{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.dd-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:12px 16px;
  background:transparent;border:none;
  color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;text-align:left;
  transition:background .1s;
}
.dd-item:hover,.dd-item:active{background:var(--card)}
.dd-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* transparent overlay to close dropdown on outside click */
#dd-backdrop{
  display:none;position:fixed;inset:0;z-index:9998;
}
#dd-backdrop.open{display:block}

/* ── SCREENS ─────────────────────────────────────────────── */
#screens{min-height:calc(100vh - var(--nav-h))}
.screen{display:none;padding:14px 14px 32px;max-width:680px;margin:0 auto}
.screen.active{display:block}

/* ── TYPOGRAPHY ──────────────────────────────────────────── */
.page-h{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:2px;color:var(--gold);margin-bottom:3px
}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:16px}

/* ── SETTINGS PANEL ──────────────────────────────────────── */
.settings-card{
  background:var(--card);border:1px solid #2a2a50;
  border-radius:14px;padding:16px;margin-bottom:16px
}
.sc-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;margin-bottom:14px
}
.sc-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sc-lbl{font-size:13px;color:var(--muted);width:76px;flex-shrink:0}
.seg{display:flex;gap:4px}
.seg-btn{
  padding:7px 14px;
  background:var(--dark3);border:1px solid #3a3a5e;border-radius:8px;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.seg-btn.on{background:var(--gold);border-color:var(--gold);color:#000}
.sc-info{
  font-size:13px;color:var(--muted);
  background:var(--dark3);border-radius:8px;padding:8px 12px;
  margin:6px 0 12px
}
.sc-info strong{color:var(--text)}
.sc-btns{display:flex;gap:8px;margin-bottom:6px}
.btn-apply{
  flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  background:var(--gold);color:#000;touch-action:manipulation;
}
.btn-apply:active{opacity:.8}
.btn-dist{
  flex:1;padding:12px;border-radius:10px;
  border:1px solid #3a3a5e;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  background:var(--dark3);color:var(--text);touch-action:manipulation;
}
.sc-warn{font-size:11px;color:var(--muted);text-align:center}



/* ── SUPABASE SYNC ───────────────────────────────────────── */
.sb-card{
  background:var(--card);border:1.5px solid #1a2a3a;
  border-radius:14px;padding:14px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.sb-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(62,207,142,.06),transparent 60%);
  pointer-events:none;
}
.sb-title{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:1.5px;color:#3ecf8e;margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.sb-sub{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.sb-status-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:#0d1f17;border:1px solid #1a3025;
  border-radius:8px;padding:8px 12px;margin-bottom:12px;
  font-family:'Barlow Condensed',sans-serif;
}
.sb-status-left{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
.sb-dot{
  width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.sb-dot.connecting{background:#f5a623;box-shadow:0 0 6px #f5a623;animation:sbPulse 1s ease-in-out infinite}
.sb-dot.live{background:#3ecf8e;box-shadow:0 0 8px #3ecf8e}
.sb-dot.offline{background:#e94560}
.sb-dot.idle{background:#555}
@keyframes sbPulse{0%,100%{opacity:1}50%{opacity:.4}}
.sb-room-badge{
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  color:#3ecf8e;letter-spacing:1px;
}
.sb-input-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.sb-input-row label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
}
.sb-input{
  background:rgba(255,255,255,.05);border:1.5px solid #2a2a44;
  border-radius:8px;padding:9px 12px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;width:100%;box-sizing:border-box;
  transition:border-color .18s;
}
.sb-input:focus{border-color:#3ecf8e}
.sb-hint{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
.sb-hint a{color:#3ecf8e;text-decoration:none}
.sb-btns{display:flex;gap:8px;margin-top:10px}
.btn-sb{
  flex:1;padding:11px 14px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:.5px;transition:all .18s;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-sb.connect{background:#3ecf8e;color:#000}
.btn-sb.connect:hover{background:#36b87e}
.btn-sb.disconnect{background:var(--dark3);color:var(--muted);border:1px solid #3a3a5e}
.btn-sb:disabled{opacity:.4;cursor:not-allowed}
/* Sync flash on score cards */
.sync-flash{animation:syncFlash .5s ease-out}
@keyframes syncFlash{0%{background:rgba(62,207,142,.2)}100%{}}
/* Top sync indicator */
.sync-topbar{
  display:none;position:fixed;top:0;left:0;right:0;
  height:3px;background:linear-gradient(90deg,#3ecf8e,#36b87e);
  z-index:9999;animation:syncBar .6s ease-out forwards;
}
@keyframes syncBar{0%{width:0;opacity:1}80%{width:100%;opacity:1}100%{opacity:0}}

/* ── GOOGLE SHEETS INTEGRATION ──────────────────────────── */
.gsh-card{
  background:var(--card);border:1.5px solid #1e3a2a;
  border-radius:14px;padding:14px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.gsh-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(52,168,83,.06),transparent 60%);
  pointer-events:none;
}
.gsh-title{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:1.5px;color:#34a853;margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.gsh-sub{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.gsh-status{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;margin-bottom:12px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;
}
.gsh-dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0}
.gsh-dot.ok{background:#34a853;box-shadow:0 0 6px #34a853}
.gsh-dot.err{background:#e94560}
.gsh-input-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.gsh-input-row label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
}
.gsh-input{
  background:rgba(255,255,255,.05);border:1.5px solid #2a2a44;
  border-radius:8px;padding:9px 12px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;width:100%;box-sizing:border-box;
  transition:border-color .18s;
}
.gsh-input:focus{border-color:#34a853}
.gsh-hint{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4}
.gsh-hint a{color:#34a853;text-decoration:none}
.gsh-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-gsh{
  flex:1;padding:11px 14px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:.5px;transition:all .18s;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;gap:7px;
  white-space:nowrap;
}
.btn-gsh.connect{background:#34a853;color:#fff}
.btn-gsh.connect:hover{background:#2d9249}
.btn-gsh.disconnect{background:var(--dark3);color:var(--muted);border:1px solid #3a3a5e}
.btn-gsh.export{background:rgba(52,168,83,.15);color:#34a853;border:1px solid rgba(52,168,83,.4)}
.btn-gsh.export:hover{background:rgba(52,168,83,.25)}
.btn-gsh:disabled{opacity:.4;cursor:not-allowed}
.btn-gsh-hist{
  background:rgba(52,168,83,.12);border:1px solid rgba(52,168,83,.35);
  border-radius:6px;color:#34a853;cursor:pointer;
  font-size:11px;font-weight:700;padding:3px 8px;
  transition:all .15s;
}
.btn-gsh-hist:hover{background:rgba(52,168,83,.25)}
.btn-gsh-hist:disabled{opacity:.4;cursor:not-allowed}

/* ── TOURNAMENT META CARD ───────────────────────────────── */
.trn-meta-card{
  background:var(--card);border:2px solid var(--gold);
  border-radius:14px;padding:14px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.trn-meta-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,200,50,.06),transparent 60%);
  pointer-events:none;
}
.trn-meta-title{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:1.5px;color:var(--gold);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.trn-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.trn-field:last-child{margin-bottom:0}
.trn-field label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
}
.trn-input{
  background:rgba(255,255,255,.05);border:1.5px solid #2a2a44;
  border-radius:8px;padding:10px 12px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;
  outline:none;width:100%;box-sizing:border-box;
  transition:border-color .18s;
}
.trn-input:focus{border-color:var(--gold)}
.trn-input[type=date]{color-scheme:dark}
.btn-finish{
  width:100%;padding:16px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#e94560,#c22040);
  color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  margin-top:16px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:opacity .18s;touch-action:manipulation;
  box-shadow:0 4px 20px rgba(233,69,96,.35);
}
.btn-finish:active{opacity:.8}

/* ── HISTORY / ARCHIVE ──────────────────────────────────── */
.hist-card{
  background:var(--card);border:1px solid #2a2a40;
  border-radius:12px;padding:14px;margin-bottom:10px;
}
.hist-hdr{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:10px;
}
.hist-name{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;
  color:var(--gold);line-height:1.1;
}
.hist-date{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;
  color:var(--muted);font-weight:600;letter-spacing:.5px;
  white-space:nowrap;margin-left:8px;
}
.hist-meta-row{
  display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;
}
.hist-chip{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.8px;padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,.06);color:var(--muted);
}
.hist-podium{
  display:flex;flex-direction:column;gap:4px;
}
.hist-row{
  display:flex;align-items:center;gap:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;
}
.hist-place-num{
  font-size:11px;font-weight:700;width:22px;text-align:center;
  color:var(--muted);
}
.hist-p-name{color:var(--text);font-weight:600}
.hist-p-pts{color:var(--muted);font-size:11px;margin-left:auto}
.hist-empty{
  text-align:center;padding:32px 16px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:.5px;
}
.hist-section-title{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--text);margin:20px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.btn-del-hist{
  background:transparent;border:1px solid #3a3a5e;
  border-radius:6px;color:var(--muted);cursor:pointer;
  font-size:11px;padding:3px 8px;
}
.btn-del-hist:hover{color:var(--red);border-color:var(--red)}
.btn-pdf-hist{
  background:rgba(255,200,50,.1);border:1px solid rgba(255,200,50,.35);
  border-radius:6px;color:var(--gold);cursor:pointer;
  font-size:11px;font-weight:700;padding:3px 8px;
  transition:all .15s;
}
.btn-pdf-hist:hover{background:rgba(255,200,50,.2);border-color:var(--gold)}

/* ── ROSTER ──────────────────────────────────────────────── */
.rc-block{
  background:var(--card);border:1px solid #2a2a40;
  border-radius:12px;overflow:hidden;margin-bottom:12px
}
.rc-hdr{
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700
}
.rc-grid{display:grid;grid-template-columns:1fr 1fr}
.rc-col-hdr{
  padding:6px 12px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
}
.rc-col-hdr.m{background:#1a1a30}
.rc-col-hdr.w{background:#16203a}
.rc-entry{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-top:1px solid #1e1e34
}
.rc-num{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  color:var(--muted);width:16px;text-align:center
}
.rc-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;padding:4px 2px
}
.rc-inp:focus{border-bottom:1px solid var(--gold)}
.rc-warn{

function activeDivKeys() {
  if (nc <= 1) return ['hard'];
  if (nc === 2) return ['hard','lite'];
  if (nc === 3) return ['hard','medium','lite'];
  return ['hard','advance','medium','lite'];
}

// ════════════════════════════════════════════════════════════
// 2. CORE MATH
// ════════════════════════════════════════════════════════════
function partnerW(mi, ri){ return (mi + ri) % ppc; }
function partnerM(wi, ri){ return ((wi - ri) % ppc + ppc) % ppc; }

function manRounds(ci, mi) {
  return Array.from({length:ppc}, (_,ri) => scores[ci]?.[mi]?.[ri] ?? null);
}
function womanRounds(ci, wi) {
  return Array.from({length:ppc}, (_,ri) => scores[ci]?.[partnerM(wi,ri)]?.[ri] ?? null);
}

// Returns sorted array for a single court+gender
// Tie-breaking: pts → bestRound → wins → stable index
function getRanked(ci, gender) {
  const arr = [];
  for (let i = 0; i < ppc; i++) {
    const rounds = gender === 'M' ? manRounds(ci, i) : womanRounds(ci, i);
    const played    = rounds.filter(r=>r!==null);
    const pts       = played.reduce((a,b)=>a+b, 0);
    const bestRound = played.length > 0 ? Math.max(...played) : 0;
    const wins      = played.filter(r=>r>=8).length;
    const rPlayed   = played.length;
    arr.push({ idx:i, pts, bestRound, wins, rPlayed });
  }
  arr.sort((a,b) => {
    if (b.pts       !== a.pts)       return b.pts       - a.pts;
    if (b.bestRound !== a.bestRound) return b.bestRound - a.bestRound;
    if (b.wins      !== a.wins)      return b.wins      - a.wins;
    return a.idx - b.idx; // stable
  });
  // Assign place with tie marker
  arr.forEach((x, i, s) => {
    const tied = i > 0 && s[i].pts === s[i-1].pts;
    x.place = tied ? s[i-1].place : i + 1;
    x.tied  = tied;
  });
  return arr;
}

// Global ranking across all active courts
function getAllRanked() {
  const out = { M:[], W:[] };
  for (const gender of ['M','W']) {
    const all = [];
    for (let ci = 0; ci < nc; ci++) {
      const ct   = ALL_COURTS[ci];
      const meta = COURT_META[ci];
      getRanked(ci, gender).forEach(r => {
        const rounds = gender==='M' ? manRounds(ci,r.idx) : womanRounds(ci,r.idx);
        all.push({
          pts: r.pts, bestRound: r.bestRound, wins: r.wins,
          rPlayed: r.rPlayed, courtPlace: r.place, tied: r.tied,
          name:      gender==='M' ? ct.men[r.idx]   : ct.women[r.idx],
          courtName: meta.name, courtColor: meta.color,
          gender, genderIcon: gender==='M' ? '🏋️' : '👩',
          originalCourtIndex: ci * ppc + r.idx,
        });
      });
    }
    // Global sort with same tie-breaking
    all.sort((a,b) => {
      if (b.pts       !== a.pts)       return b.pts       - a.pts;
      if (b.bestRound !== a.bestRound) return b.bestRound - a.bestRound;
      if (b.wins      !== a.wins)      return b.wins      - a.wins;
      return a.originalCourtIndex - b.originalCourtIndex;
    });
    // Assign global rank (shared rank for equal pts)
    all.forEach((p,i,arr) => {
      const tied = i > 0 && arr[i].pts === arr[i-1].pts;
      p.globalRank = tied ? arr[i-1].globalRank : i + 1;
      p.globalTied = tied;
    });
    out[gender] = all;
  }
  return out;
}

// Compute svod slices — CORE SLICE MATH
// HARD:    [0 .. ppc-1]           → global places 1..ppc
// ADVANCE: [ppc .. ppc*2-1]      → global places ppc+1 .. ppc*2
// MEDIUM:  [ppc*2 .. ppc*3-1]    → global places ppc*2+1 .. ppc*3
// LITE:    [ppc*3 .. end]         → global places ppc*3+1 ..
function getSvod() {
  const ranked = getAllRanked();
  const keys = activeDivKeys();
  const result = { hard:{M:[],W:[]}, advance:{M:[],W:[]}, medium:{M:[],W:[]}, lite:{M:[],W:[]} };
  // Distribute players evenly across active divisions, last div gets remainder
  keys.forEach((key, i) => {
    const isLast = i === keys.length - 1;
    const start  = i * ppc;
    const end    = isLast ? undefined : start + ppc;
    result[key] = { M: ranked.M.slice(start, end), W: ranked.W.slice(start, end) };
  });
  return result;
}

// Division court helpers
function divPartnerW(mi, ri, Nd){ return (mi + ri) % Nd; }
function divPartnerM(wi, ri, Nd){ return ((wi - ri) % Nd + Nd) % Nd; }

function divManRounds(key, mi) {
  const Nd = divRoster[key].men.length;
  return Array.from({length:Nd}, (_,ri) => (divScores[key][mi]??[])[ri] ?? null);
}
function divWomanRounds(key, wi) {
  const Nd = divRoster[key].men.length;
  return Array.from({length:Nd}, (_,ri) => {
    const mi = divPartnerM(wi, ri, Nd);
    return (divScores[key][mi]??[])[ri] ?? null;
  });
}
function divGetRanked(key, gender) {
  const names = gender==='M' ? divRoster[key].men : divRoster[key].women;
  const Nd = names.length;
  if (!Nd) return [];
  return names.map((name,i) => {
    const rounds = gender==='M' ? divManRounds(key,i) : divWomanRounds(key,i);
    const played = rounds.filter(r=>r!==null);
    return { idx:i, name, pts: played.reduce((a,b)=>a+b,0), bestRound: played.length>0?Math.max(...played):0, rPlayed:played.length };
  }).sort((a,b) => b.pts!==a.pts ? b.pts-a.pts : b.bestRound-a.bestRound)
    .map((x,i)=>({ ...x, place:i+1 }));
}


// ════════════════════════════════════════════════════════════
// 2b. COMBINED STATS HELPER
// Returns all played round scores for a player across Stage 1 + Finals
// ════════════════════════════════════════════════════════════
function getAllRoundsForPlayer(p) {
  const allRounds = [];
  // Stage 1 rounds
  for (let ci = 0; ci < nc; ci++) {
    const arr = p.gender === 'M' ? ALL_COURTS[ci].men : ALL_COURTS[ci].women;
    const idx = arr.findIndex((n, i) => n === p.name &&
      (p.gender === 'M' ? manRounds(ci, i) : womanRounds(ci, i)).some(r => r !== null));
    if (idx >= 0) {
      const rds = (p.gender === 'M' ? manRounds(ci, idx) : womanRounds(ci, idx))
        .filter(r => r !== null);
      allRounds.push(...rds);
      break;
    }
  }
  // Finals rounds — search all divisions
  for (const key of activeDivKeys()) {
    const arr = p.gender === 'M' ? divRoster[key].men : divRoster[key].women;
    const idx = arr.indexOf(p.name);
    if (idx >= 0) {
      const rds = (p.gender === 'M' ? divManRounds(key, idx) : divWomanRounds(key, idx))
        .filter(r => r !== null);
      allRounds.push(...rds);
      break;
    }
  }
  return allRounds;
}

function semverLt(a, b) {
  const pa = a.split('.').map(Number);
  const pb = b.split('.').map(Number);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const na = pa[i] ?? 0, nb = pb[i] ?? 0;
    if (na < nb) return true;
    if (na > nb) return false;
  }
  return false;
}

function loadState() {
  try {
    // Version migration: if old version or no version, clear scores to avoid corruption
    const ver = localStorage.getItem('kotc_version');
    if (!ver || semverLt(ver, '1.1')) {
      ['kotc3_scores','kotc3_divscores','kotc3_divroster'].forEach(k=>localStorage.removeItem(k));
      localStorage.setItem('kotc_version','1.1');
    }
    const cfg = localStorage.getItem('kotc3_cfg');
    if (cfg) {
      const p = JSON.parse(cfg);
      if ([4,5].includes(+p.ppc))           { ppc = +p.ppc; _ppc = ppc; }
      if ([1,2,3,4].includes(+p.nc))        { nc  = +p.nc;  _nc  = nc;  }
    }
    const r = localStorage.getItem('kotc3_roster');
    if (r) {
      const pr = JSON.parse(r);
      if (Array.isArray(pr)) pr.forEach((ct,ci) => {
        if (ci < 4) {
          if (Array.isArray(ct.men))   ALL_COURTS[ci].men   = ct.men.slice(0,5);
          if (Array.isArray(ct.women)) ALL_COURTS[ci].women = ct.women.slice(0,5);
        }
      });
    }
    const sc = localStorage.getItem('kotc3_scores');
    if (sc) {
      const ps = JSON.parse(sc);
      if (Array.isArray(ps)) ps.forEach((court,ci) => {
        if (ci >= 4 || !Array.isArray(court)) return;
        court.forEach((row,mi) => {
          if (mi >= 5 || !Array.isArray(row)) return;
          row.forEach((val,ri) => {
            if (ri < ppc && scores[ci]?.[mi]) scores[ci][mi][ri] = (val === null || val === undefined) ? null : Number(val);
          });
        });
      });
    }
    const ds = localStorage.getItem('kotc3_divscores');
    if (ds) { const pd=JSON.parse(ds); if(pd) DIV_KEYS.forEach(k=>{if(pd[k]) divScores[k]=pd[k];}); }
    const dr = localStorage.getItem('kotc3_divroster');
    const mt = localStorage.getItem('kotc3_meta');
    if (mt) { try { tournamentMeta = JSON.parse(mt); } catch(e){} }
    if (dr) { const pd=JSON.parse(dr); if(pd) DIV_KEYS.forEach(k=>{if(pd[k]) divRoster[k]=pd[k];}); }
  } catch(e){}
}

// ── Finish & archive tournament ────────────────────────────
async function finishTournament() {
  const name = tournamentMeta.name.trim() || 'Без названия';
  const date = tournamentMeta.date || new Date().toISOString().split('T')[0];

  const confirmed = await showConfirm(
    `Завершить турнир «${name}»?\n\nРезультаты сохранятся в архиве.\nТекущие очки и ростер останутся.`
  );
  if (!confirmed) return;

  // Build snapshot
  const ranked = getAllRanked();
  const allP   = [...ranked.M, ...ranked.W];

  // Enrich with totals (Stage 1 + Finals)
  const players = allP.map(p => {
    const rds = getAllRoundsForPlayer(p);
    const totalPts = rds.reduce((a,b)=>a+b,0);
    return { name: p.name, gender: p.gender, totalPts, courtName: p.courtName };
  }).filter(p => p.totalPts > 0)
    .sort((a,b) => b.totalPts - a.totalPts);

  const totalScore = players.reduce((s,p)=>s+p.totalPts,0);
  const rPlayed = (() => {
    let s=0;
    for(let ci=0;ci<nc;ci++) s+=scores[ci].flat().filter(x=>x!==null).length;
    return s;
  })();

  const snapshot = {
    id:        Date.now(),
    name,
    date,
    ppc,
    nc,
    players,
    totalScore,
    rPlayed,
    savedAt:   new Date().toISOString(),
  };

  // Load history, prepend, save
  let history = [];
  try { history = JSON.parse(localStorage.getItem('kotc3_history') || '[]'); } catch(e){}
  history.unshift(snapshot);
  localStorage.setItem('kotc3_history', JSON.stringify(history));

  showToast('🏆 Турнир сохранён в архиве!');
  // Auto-export to Google Sheets if connected
  if (gshIsConnected()) {
    gshExportTournament(snapshot, null).catch(()=>{});
  }
  // Refresh stats if currently open
  const statsScreen = document.getElementById('screen-stats');
  if (statsScreen && statsScreen.classList.contains('active')) {
    statsScreen.innerHTML = renderStats();
  }
}

async function exportToSheets(btn) {
  const url = (document.getElementById('sheets-url-input')?.value || '').trim();
  if (!url) { showToast('Укажите URL Google Apps Script'); return; }

  const ranked = getAllRanked();
  const allP   = [...ranked.M, ...ranked.W];

  // Build enriched player list with totals
  const rows = allP
    .filter(p => p.pts > 0)
    .map(p => {
      const allRounds = getAllRoundsForPlayer(p);
      const totalPts  = allRounds.reduce((a, b) => a + b, 0);
      const rTotal    = allRounds.length;
      const avg       = rTotal > 0 ? (totalPts / rTotal).toFixed(1) : '0';
      return {
        place:      p.globalRank,
        tied:       p.globalTied ? '=' : '',
        name:       p.name,
        gender:     p.gender === 'M' ? 'М' : 'Ж',
        court:      p.courtName,
        totalPts,
        rPlayed:    rTotal,
        avg,
        bestRound:  p.bestRound ?? 0,
      };
    })
    .sort((a, b) => a.place - b.place || (a.gender < b.gender ? -1 : 1));

  const payload = {
    tournament: tournamentMeta.name || 'Без названия',
    date:       tournamentMeta.date || new Date().toISOString().split('T')[0],
    exportedAt: new Date().toISOString(),
    rows,
  };

  btn.disabled = true;
  btn.textContent = 'Отправка…';
  try {
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    showToast('Данные отправлены в Google Sheets ✓');
  } catch (e) {
    showToast('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg> Экспортировать итоги`;
  }
}

async function resetTournament() {
  if (!await showConfirm('Сбросить ВСЕ результаты?\n\nРостер сохранится, все очки обнулятся.')) return;
  scores    = makeBlankScores();
  divScores = makeBlankDivScores();
  divRoster = makeBlankDivRoster();
  ['kotc3_scores','kotc3_divscores','kotc3_divroster'].forEach(k=>localStorage.removeItem(k));
  for (let i = 0; i < 8; i++) timerReset(i);
  buildAll();
  switchTab(0);
  showToast('🗑 Турнир сброшен');
}

// 4. DROPDOWN ENGINE
// ════════════════════════════════════════════════════════════
// Key design: .dropdown elements live in <body>,
// positioned via getBoundingClientRect() — never clipped by nav overflow.

let openDropdownId = null;

function openDropdown(id, anchorEl) {
  closeDropdown();
  const menu = document.getElementById(id);
  if (!menu) return;
  const rect = anchorEl.getBoundingClientRect();
  menu.style.left = Math.min(rect.left, window.innerWidth - 170) + 'px';
  menu.style.top  = rect.bottom + 'px';
  menu.classList.add('open');
  anchorEl.classList.add('dd-open');
  document.getElementById('dd-backdrop').classList.add('open');
  openDropdownId = id;
}

function closeDropdown() {
  if (openDropdownId) {
    const m = document.getElementById(openDropdownId);
    if (m) m.classList.remove('open');
  }
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('dd-open'));
  document.getElementById('dd-backdrop').classList.remove('open');
  openDropdownId = null;
}

document.getElementById('dd-backdrop').addEventListener('click', closeDropdown);

function toggleDropdown(id, btn) {
  if (openDropdownId === id) { closeDropdown(); return; }
  openDropdown(id, btn);
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';

  // ── Верхняя строка: лого + утилиты ──────────────────────
  const top = document.createElement('div');
  top.className = 'nav-top';

  const logo = document.createElement('div');
  logo.id = 'nav-logo'; // сохраняем id — инжект base64 делает getElementById('nav-logo').src
  logo.className = 'nav-logo-container';
  logo.innerHTML = '<div class="brand-main">ЛЮТЫЕ ПЛЯЖНИКИ !!</div><div class="brand-sub">King of the Court</div>';
  top.appendChild(logo);

  const spacer = document.createElement('div');
  spacer.className = 'nav-spacer';
  top.appendChild(spacer);

  [
    { label:'СВОД', tab:'svod'   },
    { label:'СТАТ', tab:'stats'  },
    { label:'⚙️',   tab:'roster' },
  ].forEach(({label,tab}) => {
    const b = document.createElement('button');
    b.className = 'nb'; b.dataset.tab = tab;
    b.textContent = label;
    b.addEventListener('click', ()=>switchTab(tab));
    top.appendChild(b);
  });
  nav.appendChild(top);

  // ── Ряд пиллов: корты + разделитель + дивизионы ─────────
  const row = document.createElement('div');
  row.className = 'nav-pills-row';

  for (let ci = 0; ci < nc; ci++) {
    const meta = COURT_META[ci];
    const p = document.createElement('button');
    p.className = 'nav-pill'; p.dataset.tab = ci;
    p.style.setProperty('--pill-c', meta.color);
    p.innerHTML = `<span class="pill-dot"></span><span class="pill-main">К${ci+1}</span><span class="pill-sub">КОРТ</span>`;
    p.addEventListener('click', ()=>switchTab(ci));
    row.appendChild(p);
  }

  const sep = document.createElement('div');
  sep.className = 'nav-pill-sep';
  row.appendChild(sep);

  const ALL_DIV_DEFS = {
    hard:    { icon:'🔥', main:'HARD',    sub:'ТОП',     color:'#e94560' },
    advance: { icon:'⚡', main:'ADVANCE', sub:'2-й ЭШ.', color:'#f5a623' },
    medium:  { icon:'⚙️', main:'MEDIUM',  sub:'3-й ЭШ.', color:'#4DA8DA' },
    lite:    { icon:'🍀', main:'LITE',    sub:'4-й ЭШ.', color:'#6ABF69' },
  };
  activeDivKeys().map(id => ({id, ...ALL_DIV_DEFS[id]})).forEach(({id,icon,main,sub,color}) => {
    const p = document.createElement('button');
    p.className = 'nav-pill pill-div-btn'; p.dataset.tab = id;
    p.style.setProperty('--pill-c', color);
    p.innerHTML = `<span class="pill-dot"></span><span class="pill-main">${icon} ${main}</span><span class="pill-sub">${sub}</span>`;
    p.addEventListener('click', ()=>switchTab(id));
    row.appendChild(p);
  });

  nav.appendChild(row);
  syncNavActive();
}

function syncNavActive() {
  // Utility buttons (nb)
  document.querySelectorAll('.nb[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === String(activeTabId));
  });
  // Pill buttons
  document.querySelectorAll('.nav-pill[data-tab]').forEach(p => {
    p.classList.toggle('active', p.dataset.tab === String(activeTabId));
  });
}

function buildScreens() {
  const sc = document.getElementById('screens');
  sc.innerHTML = '';

  // Corт screens (0..3, always created, hidden for ci >= nc)
  for (let ci = 0; ci < 4; ci++) {
    const s = document.createElement('div');
    s.className = 'screen'; s.id = `screen-${ci}`;
    s.innerHTML = ci < nc ? renderCourt(ci) : '';
    sc.appendChild(s);
  }

  // Named screens
  const named = ['svod','hard','advance','medium','lite','stats','roster'];
  named.forEach(id => {
    const s = document.createElement('div');
    s.className = 'screen'; s.id = `screen-${id}`;
    sc.appendChild(s);
  });
}

function buildAll() {
  buildNav();
  buildScreens();
  updateDivisions();
  attachListeners();
  attachSwipe();
}

// Перерисовка с сохранением позиции прокрутки и фокуса
function safeRender() {
  const _scrollPos = window.scrollY;
  const _focusId   = document.activeElement?.id;
  const _focusSel  = [document.activeElement?.selectionStart, document.activeElement?.selectionEnd];
  buildAll();
  switchTab(activeTabId != null ? activeTabId : 0);
  window.scrollTo(0, _scrollPos);
  if (_focusId) {
    const el = document.getElementById(_focusId);
    if (el) { el.focus(); try { el.setSelectionRange(_focusSel[0], _focusSel[1]); } catch(e){} }
  }
}


// ════════════════════════════════════════════════════════════
// 7. TAB SWITCHING
// ════════════════════════════════════════════════════════════
function switchTab(id) {
  closeDropdown();
  // Если запрошен неактивный дивизион — перенаправляем на первый активный
  if (typeof id === 'string' && DIV_KEYS.includes(id) && !activeDivKeys().includes(id)) {
    id = activeDivKeys()[0] || 0;
  }
  activeTabId = id;

  // Hide all, show target
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const screen = document.getElementById(`screen-${id}`);
  if (!screen) return;

  // Re-render content on demand
  if (id === 'svod')   screen.innerHTML = renderSvod();
  if (id === 'roster') screen.innerHTML = renderRoster();
  if (id === 'stats')  screen.innerHTML = renderStats();
  if (id === 'hard' || id === 'advance' || id === 'medium' || id === 'lite') {
    updateDivisions();
  }

  screen.classList.add('active');
  syncNavActive();
  window.scrollTo({top:0, behavior:'smooth'});
}

// 8. SETTINGS LOGIC
// ════════════════════════════════════════════════════════════
function setPending(newNc, newPpc) {
  _nc = newNc; _ppc = newPpc;
  // Update seg buttons
  document.querySelectorAll('#seg-c .seg-btn').forEach((b,i)=>b.classList.toggle('on', i+1===_nc));
  document.querySelectorAll('#seg-n .seg-btn').forEach((b,i)=>b.classList.toggle('on', [4,5][i]===_ppc));
  // Update info text
  const info = document.getElementById('sc-info');
  if (info) info.innerHTML = `${_nc} корт(а) × ${_ppc} = <strong>${_nc*_ppc}м + ${_nc*_ppc}ж</strong>`;
}

async function applySettings() {
  if (_ppc === ppc && _nc === nc) { showToast('Настройки не изменились'); return; }
  if (!await showConfirm(`Применить: ${_nc} кортов, ${_ppc} игроков?\n\nОчки будут сброшены!`)) return;
  ppc = _ppc; nc = _nc;
  scores    = makeBlankScores();
  divScores = makeBlankDivScores();
  divRoster = makeBlankDivRoster();
  saveState();
  buildAll();
  switchTab('roster');
  showToast(`⚙️ ${nc} корт(а) · ${ppc} игроков`);
}

function autoDistribute() {
  // Collect all names from existing roster inputs if they exist
  document.querySelectorAll('.rc-inp').forEach(inp => {
    const ci = +inp.dataset.ci, g = inp.dataset.g, pi = +inp.dataset.pi;
    if (!isNaN(ci) && ci < 4) ALL_COURTS[ci][g][pi] = inp.value.trim();
  });
  // Trim/pad each court to ppc
  for (let ci = 0; ci < nc; ci++) {
    ALL_COURTS[ci].men   = ALL_COURTS[ci].men.slice(0,ppc).concat(
      Array.from({length:Math.max(0,ppc-ALL_COURTS[ci].men.length)}, (_,i)=>`М${ci*ppc+i+1}`)
    ).slice(0,ppc);
    ALL_COURTS[ci].women = ALL_COURTS[ci].women.slice(0,ppc).concat(
      Array.from({length:Math.max(0,ppc-ALL_COURTS[ci].women.length)}, (_,i)=>`Ж${ci*ppc+i+1}`)
    ).slice(0,ppc);
  }
  saveState();
  switchTab('roster');
  showToast('📋 Распределено');
}

// ════════════════════════════════════════════════════════════
// 9. ROSTER ACTIONS
// ════════════════════════════════════════════════════════════
function applyRoster() {
  document.querySelectorAll('.rc-inp').forEach(inp => {
    const ci = +inp.dataset.ci, g = inp.dataset.g, pi = +inp.dataset.pi;
    if (!isNaN(ci) && ci < 4) {
      ALL_COURTS[ci][g][pi] = inp.value.trim() || (g==='men' ? `М${pi+1}` : `Ж${pi+1}`);
    }
  });
  // Refresh court screens
  for (let ci = 0; ci < nc; ci++) {
    const s = document.getElementById(`screen-${ci}`);
    if (s) s.innerHTML = renderCourt(ci);
  }
  updateDivisions();
  saveState();
  showToast('✅ Ростер сохранён');
}

async function resetRosterNames() {
  if (!await showConfirm('Сбросить имена к стандартным?')) return;
  const defaults = [
    { men:['Яковлев','Жидков','Алик','Куанбеков','Юшманов'],           women:['Лебедева','Арефьева Лера','Настя НМ','Сайдуллина','Маргарита'] },
    { men:['Обухов','Соболев','Иванов','Грузин','Шперлинг'],            women:['Шперлинг','Шерметова','Сабанцева','Микишева','Базутова'] },
    { men:['Сайдуллин','Лебедев','Камалов','Привет','Анашкин'],         women:['Носкова','Чемерис Влада','Кузьмина','Яковлева','Маша Привет'] },
    { men:['Игрок М1','Игрок М2','Игрок М3','Игрок М4','Игрок М5'],    women:['Игрок Ж1','Игрок Ж2','Игрок Ж3','Игрок Ж4','Игрок Ж5'] },
  ];
  defaults.forEach((d,i)=>{ ALL_COURTS[i].men=[...d.men]; ALL_COURTS[i].women=[...d.women]; });
  saveState();
  switchTab('roster');
  showToast('↺ Имена сброшены');
}

// ── Мини-бейдж позиции игрока (для корта) ───────────────────
function playerRankBadge(name, gender) {
  const ranked = getAllRanked();
  const arr = ranked[gender];
  const p = arr.find(x => x.name === name);
  if (!p || p.pts === 0) return '';
  const keys = activeDivKeys();
  const divIdx = Math.min(Math.floor((p.globalRank - 1) / ppc), keys.length - 1);
  const divKey = keys[divIdx];
  const DIV_LABELS = { hard:'🔥HARD', advance:'⚡ADV', medium:'⚙️MED', lite:'🍀LITE' };
  const divCls = 'prb-' + divKey;
  return `<div class="p-rank-badge"><span class="pb ${pbCls(p.globalRank)}">${p.globalRank}${p.globalTied?'=':''}</span><span class="p-rank-badge-div ${divCls}">${DIV_LABELS[divKey]}</span><span>${p.pts}оч</span></div>`;
}

function renderCourt(ci) {
  const ct   = ALL_COURTS[ci];
  const meta = COURT_META[ci];
  let html = renderTimerBlock(ci) + `<div class="court-title" style="color:${meta.color}">${meta.name}</div>
  <div class="court-sub">Раундов: ${ppc} · нажимайте + и −</div>
  <div class="round-nav" id="rnd-nav-${ci}">
    ${Array.from({length:ppc},(_,ri)=>{
      const hasScores = Array.from({length:ppc},(_,mi)=>scores[ci]?.[mi]?.[ri]).some(s=>s!==null&&s>0);
      const isCur = ri === (courtRound[ci]||0);
      return `<button class="rnd-btn${isCur?' active':''}${hasScores?' rnd-has-scores':''}" onclick="setCourtRound(${ci},${ri})">
        <span class="rn-num">${ri+1}</span><span class="rn-lbl">РАУНД</span>
      </button>`;
    }).join('')}
  </div>`;

  const curRi = courtRound[ci] || 0;
  for (let ri = 0; ri < ppc; ri++) {
    if (ri !== curRi) continue; // показываем только выбранный раунд
    html += `<div class="round-lbl">Раунд ${ri+1}</div>`;
    for (let mi = 0; mi < ppc; mi++) {
      const wi  = partnerW(mi, ri);
      const sc  = scores[ci]?.[mi]?.[ri] ?? null;
      const isNull = sc===null;
      const scVal = isNull ? 0 : sc;
      const mx  = scVal>=15, zr = !isNull && scVal===0;
      html += `
      <div class="match-card${(!isNull && scVal>0)?' has-score':''}" id="card-${ci}-${mi}-${ri}">
        <div class="mrow">
          <span class="g-icon">🏋️</span>
          <div class="p-info">
            <div class="p-name">${esc(ct.men[mi]||'—')}</div>
            ${ct.men[mi] ? playerRankBadge(ct.men[mi], 'M') : ''}
            <div class="p-partner">+ ${esc(ct.women[wi]||'—')}</div>
          </div>
          <div class="score-widget">
            <button class="score-btn minus" data-ci="${ci}" data-mi="${mi}" data-ri="${ri}" data-dir="-1"${(isNull||scVal<=0)?' disabled':''}>−</button>
            <div class="score-disp${mx?' mx':zr?' zr':isNull?' zr':''}" id="sd-${ci}-${mi}-${ri}">${isNull?'–':scVal}<span class="score-max-lbl">${mx?'МАХ':isNull?'':'/15'}</span></div>
            <button class="score-btn plus"  data-ci="${ci}" data-mi="${mi}" data-ri="${ri}" data-dir="1"${scVal>=15?' disabled':''}>+</button>
          </div>
        </div>
        <div class="mrow auto-row">
          <span class="g-icon">👩</span>
          <div class="p-info">
            <div class="p-name">${esc(ct.women[wi]||'—')}</div>
            ${ct.women[wi] ? playerRankBadge(ct.women[wi], 'W') : ''}
            <div class="p-partner">+ ${esc(ct.men[mi]||'—')}</div>
          </div>
          <span class="auto-badge">AUTO</span>
          <div class="auto-score" id="as-${ci}-${wi}-${ri}">${isNull?'–':scVal}</div>
        </div>
      </div>`;
    }
  }
  html += renderTotals(ci);
  html += `<button class="btn-reset-court" onclick="resetCourt(${ci})">↺ Сбросить очки ${meta.name}</button>`;
  return html;
}

// 12. RENDER: СВОДКА
// ════════════════════════════════════════════════════════════
function renderSvod() {
  // ── Check if finals are active ──────────────────────────────
  const divsActive = activeDivKeys().some(k => divRoster[k].men.length > 0);

  const svod = getSvod();
  const ALL_GROUP_DEFS = {
    hard:    { cls:'lh-hard',    icon:'🏆' },
    advance: { cls:'lh-advance', icon:'⚡' },
    medium:  { cls:'lh-medium',  icon:'⚙️' },
    lite:    { cls:'lh-lite',    icon:'🍀' },
  };
  const keys = activeDivKeys();
  const groups = keys.map((key, i) => {
    const isLast = i === keys.length - 1;
    const start  = i * ppc + 1;
    const end    = isLast ? null : (i + 1) * ppc;
    const rangeLabel = isLast ? `${start}+` : `${start}–${end}`;
    const label  = `${key.toUpperCase()} (Места ${rangeLabel})`;
    return { key, ...ALL_GROUP_DEFS[key], label, rangeLabel };
  });

  // ── Helper: render a svod-table (Stage 1 ranking) ───────────
  function renderStage1Table(g) {
    const mpl = svod[g.key].M;
    const wpl = svod[g.key].W;
    if (!mpl.length && !wpl.length)
      return `<div class="div-empty">Недостаточно участников</div>`;
    let t = `<div class="svod-table-wrap"><table class="svod-table">
      <thead><tr>
        <th class="td-rank">#</th>
        <th>Имя</th><th>Корт</th>
        <th class="td-pts">Оч·1</th>
        <th class="td-avg">avg/р</th>
      </tr></thead><tbody>`;
    const allPlayers = [...mpl,...wpl];
    // Динамические разделители по activeDivKeys
    const sepLabels = {};
    const ALL_SEP = { advance:{cls:'sep-advance',label:'⚡ ADVANCE'}, medium:{cls:'sep-medium',label:'⚙️ MEDIUM'}, lite:{cls:'sep-lite',label:'🍀 LITE'} };
    activeDivKeys().forEach((key, i) => {
      if (i === 0) return; // первый дивизион — разделитель перед ним не нужен
      const boundary = i * ppc; // после этого глобального ранга
      if (ALL_SEP[key]) sepLabels[boundary] = ALL_SEP[key];
    });
    allPlayers.forEach(p => {
      const avg = p.rPlayed>0 ? (p.pts/p.rPlayed).toFixed(1) : '—';
      t += `<tr>
        <td class="td-rank"><span class="pb ${pbCls(p.globalRank)}">${p.globalRank}${p.globalTied?'<sup>=</sup>':''}</span></td>
        <td><div class="td-name">${p.genderIcon} ${esc(p.name)}</div></td>
        <td class="td-court" style="color:${p.courtColor}">${p.courtName}</td>
        <td class="td-pts">${p.pts}</td>
        <td class="td-avg">${avg}</td>
      </tr>`;
      // Разделитель после границы дивизиона (только если нет ничьей)
      if (sepLabels[p.globalRank] && !p.globalTied) {
        const sep = sepLabels[p.globalRank];
        t += `<tr class="svod-div-sep ${sep.cls}"><td colspan="5"><div class="svod-div-sep-inner"><div class="svod-div-sep-line"></div><span>${sep.label}</span><div class="svod-div-sep-line"></div></div></td></tr>`;
      }
    });
    return t + `</tbody></table></div>`;
  }

  // ── Helper: render finals results table ─────────────────────
  function renderFinalsTable(g) {
    const men   = divGetRanked(g.key, 'M');
    const women = divGetRanked(g.key, 'W');
    if (!men.length && !women.length)
      return `<div class="div-empty">Финал ещё не начат</div>`;

    // For HARD: place=1 → absolute champion. Encode global offset.
    const globalOffset = g.key==='hard' ? 0 : g.key==='advance' ? ppc : g.key==='medium' ? ppc*2 : ppc*3;

    let t = `<div class="svod-table-wrap"><table class="svod-table">
      <thead><tr>
        <th class="td-rank" title="Место в финале">Фин</th>
        <th>Имя</th>
        <th class="td-pts">Оч·2</th>
        <th class="td-avg">avg/р</th>
        <th class="td-rank" style="text-align:right" title="Итоговое место">Итог</th>
      </tr></thead><tbody>`;

    [...men,...women].forEach(p => {
      const avg = p.rPlayed>0 ? (p.pts/p.rPlayed).toFixed(1) : '—';
      const globalPlace = globalOffset + p.place;
      t += `<tr>
        <td class="td-rank"><span class="pb ${pbCls(p.place)}">${p.place}</span></td>
        <td><div class="td-name">${esc(p.name)}</div></td>
        <td class="td-pts">${p.pts}</td>
        <td class="td-avg">${avg}</td>
        <td class="td-rank" style="text-align:right"><span class="pb ${pbCls(globalPlace)}" style="font-size:10px;padding:2px 4px">${globalPlace}</span></td>
      </tr>`;
    });
    return t + `</tbody></table></div>`;
  }

  let html = `<div class="page-h">📊 СВОДКА</div>
  <div class="page-sub">${nc} корта · ${ppc} игроков${divsActive ? ' · <strong style="color:var(--gold)">Финалы активны</strong>' : ' · актуально в реальном времени'}</div>`;

  groups.forEach(g => {
    const mpl = svod[g.key].M;
    const wpl = svod[g.key].W;
    html += `<div class="level-block">
      <div class="level-hdr ${g.cls}">
        <span>${g.icon} ${g.label}</span>
        <span class="level-desc">${mpl.length}м · ${wpl.length}ж</span>
      </div>`;

    if (!divsActive) {
      // Mode 1: only Stage 1
      html += renderStage1Table(g);
    } else {
      // Mode 2: Stage 1 seeding + Finals results side by side (stacked on mobile)
      html += `<div class="svod-dual">
        <div class="svod-half">
          <div class="svod-half-lbl">Этап 1 — Квалификация</div>
          ${renderStage1Table(g)}
        </div>
        <div class="svod-half">
          <div class="svod-half-lbl">Финал — Итог</div>
          ${renderFinalsTable(g)}
        </div>
      </div>`;
    }
    html += `</div>`;
  });
  return html;
}

// 13. DIVISIONS UPDATE
// ════════════════════════════════════════════════════════════
function updateDivisions() {
  const svod = getSvod();
  activeDivKeys().forEach(key => {
    const sM = svod[key].M;
    const sW = svod[key].W;
    const newMen   = sM.map(p=>p.name);
    const newWomen = sW.map(p=>p.name);
    // Reset div scores if roster changed
    const oldMen   = divRoster[key].men;
    const oldWomen = divRoster[key].women;
    if (JSON.stringify([...newMen].sort())!==JSON.stringify([...oldMen].sort()) ||
        JSON.stringify([...newWomen].sort())!==JSON.stringify([...oldWomen].sort())) {
      divRoster[key] = { men:newMen, women:newWomen };
      const Nd = Math.max(newMen.length, 1);
      // Не сбрасываем если в финале уже есть введённые очки
      const hasFinalsData = divScores[key]?.some(row => row?.some(v => v !== null && v > 0));
      if (!hasFinalsData) {
        divScores[key] = Array.from({length:Nd}, ()=>Array(Nd).fill(null));
      }
    }
    const screen = document.getElementById(`screen-${key}`);
    if (screen) {
      // Pass svod slices for chip display
      screen.innerHTML = renderDivCourt(key, sM, sW);
    }
  });
}

// 15. RENDER: STATS
// ════════════════════════════════════════════════════════════
function renderStats() {
  const ranked = getAllRanked();
  const allP   = [...ranked.M, ...ranked.W];
  if (allP.every(p=>p.pts===0)) {
    return `<div class="stats-empty">
      <div style="font-size:48px">📊</div>
      <div class="page-h" style="margin-top:12px">Пусто</div>
      <div class="page-sub">Введите очки на кортах Этапа 1</div>
    </div>`;
  }
  const total  = allP.reduce((s,p)=>s+p.pts, 0);
  const avgGlob= (total/allP.length).toFixed(1);
  const rPlayed= (() => { let s=0; for(let ci=0;ci<nc;ci++) s+=scores[ci].flat().filter(x=>x!==null).length; return s; })();
  const divVol = DIV_KEYS.reduce((o,k)=>({...o,[k]:(divScores[k]||[]).flat().reduce((s,x)=>s+(x||0),0)}),{});

  // Enrich allP with combined total (Stage 1 + Finals)
  const allPEnriched = allP.map(p => {
    const allRounds = getAllRoundsForPlayer(p);
    const totalPts  = allRounds.reduce((a,b)=>a+b, 0);
    const bestRound = allRounds.length > 0 ? Math.max(...allRounds) : p.bestRound;
    const rTotal    = allRounds.length;
    return { ...p, totalPts, bestRound, rTotal };
  });
  const top5   = [...allPEnriched].sort((a,b)=>b.totalPts-a.totalPts).slice(0,5);
  const maxPts = top5[0]?.totalPts || 1;

  // Consistency = low variance across ALL rounds (Stage 1 + Finals)
  function getVar(p) {
    const rds = getAllRoundsForPlayer(p);
    if (!rds.length) return 999;
    const avg = rds.reduce((a,b)=>a+b,0)/rds.length;
    return rds.reduce((s,r)=>s+(r-avg)**2,0)/rds.length;
  }
  const consist = [...allPEnriched].filter(p=>p.totalPts>0)
    .map(p=>({...p,vari:getVar(p)}))
    .sort((a,b)=>a.vari-b.vari).slice(0,5);

  const courtEff = Array.from({length:nc},(_,ci)=>{
    const t = scores[ci].flat().reduce((s,x)=>s+x,0);
    const n = scores[ci].flat().filter(x=>x!==null).length||1;
    return { name:COURT_META[ci].name, color:COURT_META[ci].color, total:t, avg:(t/n).toFixed(1) };
  });

  return `<div class="stats-grid">
    <div class="stat-card voltage-card">
      <div class="stat-card-title">⚡ ВОЛЬТАЖ ТУРНИРА</div>
      <div class="voltage-num">${total}</div>
      <div class="voltage-sub">${allP.length} игроков · ${rPlayed} сыгранных раундов</div>
      <div class="voltage-row"><span>Среднее / игрок</span><strong>${avgGlob}</strong></div>
      <div class="voltage-row"><span>Финалы (2-й тур)</span><strong>${activeDivKeys().map(k=>divVol[k]||0).join('/')}</strong></div>
    </div>

    <div class="stat-card">
      <div class="stat-card-title">🏅 ТОП-5 ИГРОКОВ</div>
      ${top5.map((p,i)=>{
        const pct=Math.round(p.pts/maxPts*100);
        const pb=pbCls(p.globalRank);
        const fc=i===0?'bfg':i===1?'bfs':i===2?'bfb':'bfl';
        const avg=p.rTotal>0?(p.totalPts/p.rTotal).toFixed(1):'—';
        return `<div class="bar-row">
          <div class="bar-lbl">
            <span class="pb ${pb}" style="font-size:11px;padding:2px 5px">${p.globalRank}</span>
            <span class="bar-name">${p.genderIcon} ${esc(p.name)}</span>
            <span class="bar-court">${p.courtName}</span>
            <span class="bar-avg">avg ${avg}</span>
            <span class="bar-pts">${p.totalPts}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${fc}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>

    <div class="stat-card">
      <div class="stat-card-title">🎯 СТАБИЛЬНОСТЬ</div>
      ${consist.map((p,i)=>`
        <div class="consist-row">
          <span class="consist-rank">${i+1}</span>
          <span class="bar-name">${p.genderIcon} ${esc(p.name)}</span>
          <span class="bar-court">${p.courtName}</span>
          <div class="consist-bar"><div class="consist-fill" style="width:${Math.max(5,100-p.vari*5)}%"></div></div>
          <span class="bar-pts">${p.totalPts??p.pts}</span>
        </div>`).join('')}
    </div>

    <div class="stat-card">
      <div class="stat-card-title">🏐 ЭФФЕКТИВНОСТЬ КОРТОВ</div>
      ${courtEff.map(c=>{
        const pct=Math.round(c.total/((total||2)/2)*100);
        return `<div class="court-eff-row">
          <span class="bar-name" style="color:${c.color};min-width:90px">${c.name}</span>
          <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${c.color}55;border-right:2px solid ${c.color}"></div></div>
          <span class="bar-pts" style="font-size:12px;margin-left:6px">${c.total}оч avg${c.avg}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="stat-card" style="border-color:#1a3a1a">
      <div class="stat-card-title">📊 ЭКСПОРТ В GOOGLE SHEETS</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:10px">Вставьте URL вашего Google Apps Script (Web App) для экспорта итоговой таблицы.</div>
      <input class="sheets-url-input" id="sheets-url-input"
        type="url" placeholder="https://script.google.com/macros/s/.../exec"
        value="${localStorage.getItem('kotc3_sheets_url')||''}"
        oninput="localStorage.setItem('kotc3_sheets_url',this.value)">
      <button class="btn-sheets" onclick="exportToSheets(this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        Экспортировать итоги
      </button>
    </div>

    <div class="stat-card" style="border-color:#3a1a1a">
      <div class="stat-card-title">⚠️ УПРАВЛЕНИЕ ТУРНИРОМ</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:12px">Сброс очищает все результаты. Ростер сохраняется.</div>
      <button class="btn-reset-tournament" onclick="resetTournament()">🗑 Сбросить турнир</button>
    </div>
  </div>

  ${renderHistory()}`;
}

    </div>`;
  }).join('');

  return html;
}

function sbSetStatus(s) {
  sbStatus = s;
  // Update dot in roster card if visible
  document.querySelectorAll('.sb-dot').forEach(d => {

  });
  document.querySelectorAll('.sb-status-text').forEach(el => {

    }[s] || s;

  });

    el.textContent = s === 'live' ? (sbConfig.roomCode || '') : '';
  });

// ── Connect ──────────────────────────────────────────────
async function sbConnect() {
  if (!sbConfig.roomCode) {
    showToast('⚠️ Введите код комнаты'); return;
  }
  // Disconnect existing channel to prevent duplicate subscriptions
  if (sbChannel) { sbClient?.removeChannel(sbChannel); sbChannel = null; }
  sbSetStatus('connecting');
  try {
    // Init client
    sbClient = supabase.createClient(sbConfig.url, sbConfig.anonKey);

    // Pull current state from server
    const { data, error } = await sbClient
      .from('kotc_sessions')
      .select('state')
      .eq('room_code', sbConfig.roomCode)
      .single();

    if (data?.state) {
      sbApplyRemoteState(data.state);
      showToast('📥 Состояние загружено с сервера');
    } else {
      // Сервер пустой — пушим локальное состояние как мастер
      await sbClient.from('kotc_sessions').upsert({
        room_code:  sbConfig.roomCode,
        state:      sbGetLocalState(),
        updated_at: new Date().toISOString(),
      });
      showToast('📤 Локальное состояние отправлено на сервер');
    }

    // Subscribe to changes
    sbChannel = sbClient
      .channel('kotc-' + sbConfig.roomCode)
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table:  'kotc_sessions',
        filter: `room_code=eq.${sbConfig.roomCode}`,
      }, payload => {
        if (payload.new?.state) sbApplyRemoteState(payload.new.state);
      })
      .subscribe(status => {
        if (status === 'SUBSCRIBED') {
          sbSetStatus('live');
          showToast('🟢 Синхронизация активна · ' + sbConfig.roomCode);
          sbRefreshCard();
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          sbSetStatus('offline');
        }
      });
  } catch(e) {
    sbSetStatus('offline');
    showToast('❌ Ошибка: ' + e.message);
  }
}

function sbDisconnect() {
  if (sbChannel) { sbClient.removeChannel(sbChannel); sbChannel = null; }
  sbClient = null;
  sbSetStatus('idle');
  showToast('🔌 Синхронизация отключена');
  sbRefreshCard();
}

// ── Push local state to Supabase (debounced 400ms) ───────
function sbPush() {
  if (!sbClient || sbStatus !== 'live' || sbIsApplying) return;
  clearTimeout(sbSaveTimer);
  sbSaveTimer = setTimeout(async () => {
    try {
      const state = sbGetLocalState();
      await sbClient.from('kotc_sessions').upsert({
        room_code:   sbConfig.roomCode,
        state,
        updated_at:  new Date().toISOString(),
      });
      // Flash top bar
      const bar = document.getElementById('sync-topbar');
      if (bar) { bar.style.display = 'block'; setTimeout(()=>{ bar.style.display='none'; }, 700); }
    } catch(e) {
      console.warn('Supabase push error:', e);
    }
  }, 400);
}

// ── Apply remote state from server ───────────────────────
function sbApplyRemoteState(state) {
  sbIsApplying = true;
  try {
    // Smart merge: apply only if incoming timestamp is newer
    if (state.scores && state.scoreTs) {
      state.scores.forEach((courtScores, ci) => {
        const remoteTs = state.scoreTs['c'+ci] || 0;
        const localTs  = scoreTs['c'+ci] || 0;
        if (remoteTs >= localTs) scores[ci] = courtScores;
      });
    } else if (state.scores) {
      scores = state.scores;
    }
    if (state.divScores && state.scoreTs) {
      Object.keys(state.divScores).forEach(key => {
        const remoteTs = state.scoreTs[key] || 0;
        const localTs  = scoreTs[key] || 0;
        if (remoteTs >= localTs) divScores[key] = state.divScores[key];
      });
    } else if (state.divScores) {
      divScores = state.divScores;
    }
    if (state.scoreTs) {
      Object.keys(state.scoreTs).forEach(k => {
        scoreTs[k] = Math.max(scoreTs[k] || 0, state.scoreTs[k] || 0);
      });
    }
    if (state.divRoster) divRoster = state.divRoster;
    if (state.roster) {
      state.roster.forEach((c, ci) => {
        if (ALL_COURTS[ci]) {
          ALL_COURTS[ci].men   = c.men   || [];
          ALL_COURTS[ci].women = c.women || [];
        }
      });
    }
    if (state.meta) tournamentMeta = { ...tournamentMeta, ...state.meta };
    if (state.cfg) { ppc = state.cfg.ppc || ppc; nc = state.cfg.nc || nc; }
    if (state.timers) {
      const now = Date.now();
      state.timers.forEach((s, ci) => {
        if (!timerState[ci]) return;
        // Smart merge: применяем только если входящий ts новее локального
        const remoteTs = (state.timerTs && state.timerTs[ci]) || 0;
        const localTs  = timerTs[ci] || 0;
        if (remoteTs < localTs) return;
        const ts = timerState[ci];
        ts.preset = s.preset ?? ts.preset;
        ts.total  = s.total  ?? ts.total;
        ts.startedAt      = s.startedAt      ?? null;
        ts.startRemaining = s.startRemaining ?? ts.startRemaining;
        ts.running = s.running ?? false;
        if (ts.running && ts.startedAt) {
          const elapsed = (now - ts.startedAt) / 1000;
          ts.remaining = Math.max(0, ts.startRemaining - elapsed);
          if (ts.remaining <= 0) ts.running = false;
        } else {
          ts.remaining = s.remaining ?? ts.remaining;
        }
        timerTs[ci] = remoteTs; // фиксируем принятый ts
      });
      saveTimerState();
    }
    // Перерисовка с сохранением скролла и фокуса
    safeRender();
  } finally {
    sbIsApplying = false;
  }
}

// ── Collect local state ───────────────────────────────────
function sbGetLocalState() {
  return {
    scores,
    divScores,
    divRoster,
    roster: ALL_COURTS.map(c => ({ men:[...c.men], women:[...c.women] })),
    meta:   tournamentMeta,
    cfg:     { ppc, nc },
    scoreTs: { ...scoreTs },
    timers: timerState.map(ts => ({
      preset: ts.preset, total: ts.total, remaining: ts.remaining,
      running: ts.running, startedAt: ts.startedAt, startRemaining: ts.startRemaining,
    })),
    timerTs: [...timerTs],
  };
}

// ── OAuth via Google Identity Services ───────────────────
function gshConnect() {
  if (!gshConfig.clientId) {
    showToast('⚠️ Введите Client ID'); return;
  }
  if (!window.google?.accounts?.oauth2) {
    showToast('⚠️ Нет подключения — скрипт Google не загружен'); return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: gshConfig.clientId,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    callback: (resp) => {
      if (resp.error) {
        showToast('❌ Ошибка авторизации: ' + resp.error);
        return;
      }
      gshToken = resp.access_token;
      gshTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      showToast('✅ Google подключён!');
      gshRefreshCard();
    },
  });
  client.requestAccessToken();
}

function gshDisconnect() {
  if (gshToken && window.google?.accounts?.oauth2) {
    google.accounts.oauth2.revoke(gshToken);
  }
  gshToken = null; gshTokenExpiry = 0;
  showToast('🔌 Google отключён');
  gshRefreshCard();
}

// ── Sheets API helpers ────────────────────────────────────
async function gshFetch(url, opts = {}) {
  const resp = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + gshToken,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({error:{message:resp.statusText}}));
    throw new Error(err.error?.message || resp.statusText);
  }
  return resp.json();
}

async function gshGetOrCreateSpreadsheet(title) {
  if (gshConfig.spreadsheetId) return gshConfig.spreadsheetId;
  // Create new spreadsheet
  const data = await gshFetch('https://sheets.googleapis.com/v4/spreadsheets', {
    method: 'POST',
    body: JSON.stringify({ properties: { title: 'КОТС — История турниров' } }),
  });
  const id = data.spreadsheetId;
  gshConfig.spreadsheetId = id;
  gshSaveConfig();
  gshRefreshCard();
  return id;
}

async function gshEnsureSheet(spreadsheetId, sheetTitle) {
  // Get existing sheets
  const meta = await gshFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties`);
  const exists = meta.sheets?.some(s => s.properties.title === sheetTitle);
  if (exists) return;
  // Add sheet
  await gshFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
    method: 'POST',
    body: JSON.stringify({
      requests: [{ addSheet: { properties: { title: sheetTitle } } }]
    }),
  });
}

async function gshWriteTournament(tournament) {
  if (!gshIsConnected()) throw new Error('Нет авторизации Google');

  const dateStr = tournament.date || new Date().toISOString().split('T')[0];
  const sheetTitle = `${dateStr} ${tournament.name || 'Турнир'}`.slice(0, 60);

  const spreadsheetId = await gshGetOrCreateSpreadsheet();
  await gshEnsureSheet(spreadsheetId, sheetTitle);

  // Build rows
  const header = [
    ['КОРОЛЬ ПЛОЩАДКИ — ПРОТОКОЛ'],
    [tournament.name || 'Турнир'],
    [dateStr],
    [],
    ['Кортов', tournament.nc, 'Игроков на корт', tournament.ppc, 'Раундов сыграно', tournament.rPlayed, 'Сумма очков', tournament.totalScore],
    [],
    ['Место', 'Имя', 'Пол', 'Корт', 'Очки'],
  ];
  const rows = tournament.players.map((p, i) => [
    i + 1,
    p.name,
    p.gender === 'M' ? 'Мужчины' : 'Женщины',
    p.courtName || '—',
    p.totalPts,
  ]);
  const allRows = [...header, ...rows];

  await gshFetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetTitle + '!A1')}:append?valueInputOption=USER_ENTERED&insertDataOption=OVERWRITE`,
    {
      method: 'POST',
      body: JSON.stringify({ values: allRows }),
    }
  );

  // Format header rows bold + color
  const sheetId = await gshFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties`)
    .then(m => m.sheets?.find(s => s.properties.title === sheetTitle)?.properties?.sheetId);

  if (sheetId !== undefined) {
    await gshFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`, {
      method: 'POST',
      body: JSON.stringify({ requests: [
        // Title row bold + yellow bg
        { repeatCell: { range:{sheetId,startRowIndex:0,endRowIndex:1}, cell:{userEnteredFormat:{
          backgroundColor:{red:0.06,green:0.06,blue:0.1},
          textFormat:{bold:true,fontSize:14,foregroundColor:{red:1,green:0.78,blue:0.2}},
        }}, fields:'userEnteredFormat' }},
        // Column headers bold
        { repeatCell: { range:{sheetId,startRowIndex:6,endRowIndex:7}, cell:{userEnteredFormat:{
          backgroundColor:{red:0.12,green:0.12,blue:0.22},
          textFormat:{bold:true,foregroundColor:{red:0.53,green:0.53,blue:0.8}},
        }}, fields:'userEnteredFormat' }},
        // Auto-resize columns
        { autoResizeDimensions: { dimensions:{sheetId,dimension:'COLUMNS',startIndex:0,endIndex:5} }},
      ]})
    });
  }

  return spreadsheetId;
}

  }
}

// 16. SCORE INTERACTIONS
// ════════════════════════════════════════════════════════════
function attachListeners() {
  // Remove old listener if any
  const sc = document.getElementById('screens');
  sc.removeEventListener('click', scoreClickHandler);
  sc.addEventListener('click', scoreClickHandler);
}

function scoreClickHandler(e) {
  const btn = e.target.closest('.score-btn');
  if (!btn) return;
  if (btn.dataset.busy) return;
  btn.dataset.busy = '1';
  setTimeout(() => delete btn.dataset.busy, 200);
  const dir    = +btn.dataset.dir;
  const mi     = +btn.dataset.mi;
  const ri     = +btn.dataset.ri;
  const divKey = btn.dataset.div;

  if (divKey) {
    // Division score
    if (!divScores[divKey]?.[mi]) return;
    const old  = divScores[divKey][mi][ri] ?? null;
    const base = old === null ? (dir > 0 ? 0 : -1) : old;
    const next = Math.max(0, Math.min(15, base + dir));
    if (old !== null && next === old) return;
    divScores[divKey][mi][ri] = next;
    scoreTs[divKey] = Date.now();
    updateDivWidget(divKey, mi, ri, next);
    saveState();
  } else {
    // Court score
    const ci   = +btn.dataset.ci;
    const old  = scores[ci]?.[mi]?.[ri] ?? null;
    const base = old === null ? (dir > 0 ? 0 : -1) : old;
    const next = Math.max(0, Math.min(15, base + dir));
    if (old !== null && next === old) return;
    scores[ci][mi][ri] = next;
    scoreTs['c'+ci] = Date.now();
    updateCourtWidget(ci, mi, ri, next);
    updateDivisions(); // recompute on every score change
    saveState();
  }
}

function updateCourtWidget(ci, mi, ri, val) {
  const mx = val>=15, zr = val===0;
  // Score display
  const sd = document.getElementById(`sd-${ci}-${mi}-${ri}`);
  if (sd) {
    sd.className = `score-disp${mx?' mx':zr?' zr':''}`;
    sd.innerHTML = `${val}<span class="score-max-lbl">${mx?'МАХ':'/15'}</span>`;
    sd.classList.add('pop');
    setTimeout(()=>sd.classList.remove('pop'), 250);
  }
  // Buttons
  const card = document.getElementById(`card-${ci}-${mi}-${ri}`);
  if (card) {
    card.querySelector('.score-btn.minus').disabled = (val<=0);
    card.querySelector('.score-btn.plus').disabled  = val>=15;
    card.classList.toggle('has-score', val>0);
  }
  // Auto score for woman
  const wi = partnerW(mi, ri);
  const as = document.getElementById(`as-${ci}-${wi}-${ri}`);
  if (as) as.textContent = val;
  // Totals
  const tot = document.getElementById(`totals-${ci}`);
  if (tot) tot.outerHTML = renderTotals(ci);
}

function updateDivWidget(key, mi, ri, val) {
  const Nd = divRoster[key].men.length;
  const mx = val>=15, zr = val===0;
  const sd = document.getElementById(`dsd-${key}-${mi}-${ri}`);
  if (sd) {
    sd.className = `score-disp${mx?' mx':zr?' zr':''}`;
    sd.innerHTML = `${val}<span class="score-max-lbl">${mx?'МАХ':'/15'}</span>`;
    sd.classList.add('pop');
    setTimeout(()=>sd.classList.remove('pop'), 250);
  }
  const card = document.getElementById(`dcard-${key}-${mi}-${ri}`);
  if (card) {
    card.querySelector('.score-btn.minus').disabled = val<=0;
    card.querySelector('.score-btn.plus').disabled  = val>=15;
    card.classList.toggle('has-score', val>0);
  }
  const wi = divPartnerW(mi, ri, Nd);
  const as = document.getElementById(`das-${key}-${wi}-${ri}`);
  if (as) as.textContent = val;
  // Re-render div totals in-place
  const dt = document.getElementById(`dtotals-${key}`);
  if (dt) {
    const newHtml = (() => {
      let h = `<div class="totals-section" id="dtotals-${key}">
        <div class="totals-title">🏆 ИТОГО — МУЖЧИНЫ</div>`;
      divGetRanked(key,'M').forEach(r=>{
        h+=`<div class="totals-row"><div class="pb ${pbCls(r.place)}">${r.place}</div><div class="t-name">${esc(r.name)}</div><div class="t-pts">${r.pts}</div><div class="t-lbl">оч</div></div>`;
      });
      h+=`<div class="totals-title" style="border-top:1px solid #1e1e34">🏆 ИТОГО — ЖЕНЩИНЫ</div>`;
      divGetRanked(key,'W').forEach(r=>{
        h+=`<div class="totals-row"><div class="pb ${pbCls(r.place)}">${r.place}</div><div class="t-name">${esc(r.name)}</div><div class="t-pts">${r.pts}</div><div class="t-lbl">оч</div></div>`;
      });
      return h+'</div>';
    })();
    dt.outerHTML = newHtml;
  }
}

async function resetCourt(ci) {
  if (!await showConfirm(`Сбросить очки ${COURT_META[ci].name}?`)) return;
  scores[ci] = Array.from({length:ppc}, ()=>Array(ppc).fill(null));
  timerReset(ci);
  const s = document.getElementById(`screen-${ci}`);
  if (s) s.innerHTML = renderCourt(ci);
  updateDivisions();
  saveState();
  showToast('↺ Очки сброшены');
}
async function resetDivision(key) {
  if (!await showConfirm(`Сбросить очки дивизиона?`)) return;
  const Nd = divRoster[key].men.length || ppc;
  divScores[key] = Array.from({length:Nd}, ()=>Array(Nd).fill(null));
  updateDivisions();
  saveState();
  showToast('↺ Очки дивизиона сброшены');
}

  _toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}
